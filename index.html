<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangalam</title>
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        brandRed: '#8B1E41',
                        brandBlue: '#2D3A8C',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pt-[72px]">
    
    <div id="app">
        <header id="main-header" class="fixed top-0 left-0 w-full bg-white z-50 py-4 px-6 md:px-12 flex justify-between items-center border-b border-gray-100 shadow-sm">
            <div class="flex items-center">
                <a href="#" class="flex flex-col">
                    <img src="assets/logo.png" alt="Mangalam Logo" class="h-10 w-auto">
                </a>
            </div>

            <div class="flex items-center gap-8 ml-auto">
                <ul class="hidden md:flex items-center gap-8">
                    <li><a href="#" class="text-gray-700 hover:text-brandBlue font-medium transition-colors">About Us</a></li>
                    <li class="relative group cursor-pointer">
                        <div class="flex items-center gap-1 text-gray-700 hover:text-brandBlue font-medium transition-colors">
                            <span>Products</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </li>
                </ul>

                <div class="hidden md:block">
                    <a href="#" class="bg-brandBlue hover:bg-opacity-90 text-white font-medium py-2.5 px-6 rounded-md transition-all inline-block shadow-sm">Contact Us</a>
                </div>

                <button class="md:hidden text-gray-800 ml-4">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
        </header>

       
    </div>

    <script src="script.js"></script>
</body>
</html>
